name: Morning Brief Agent

on:
  schedule:
    # Runs at 11:30 UTC (6:30 AM ET) every day
    - cron: '30 11 * * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      - name: Run morning brief
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
          AGENT_EMAIL_APP_PASSWORD: ${{ secrets.AGENT_EMAIL_APP_PASSWORD }}
          DISCORD_WEBHOOK_BRIEF: ${{ secrets.DISCORD_WEBHOOK_BRIEF }}
        run: |
          python scripts/morning_brief.py
      
      - name: Report status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Morning brief completed successfully"
          else
            echo "❌ Morning brief failed"
            exit 1
          fi
